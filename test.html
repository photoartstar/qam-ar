<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindAR Camera Test</title>
  <script src="./lib/aframe.min.js"></script>
  <script src="./lib/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #status {
      position: fixed; top: 20px; left: 0; right: 0; z-index: 9999;
      color: lime; font-size: 16px; text-align: center;
      font-family: monospace; background: rgba(0,0,0,0.7); padding: 8px;
    }
  </style>
</head>
<body>
  <div id="status">Loading…</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box position="0 0 0" color="red" scale="0.5 0.5 0.5"></a-box>
    </a-entity>
  </a-scene>

  <script>
    const s = document.getElementById('status');
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => { s.textContent = 'Scene loaded — waiting for camera…'; });
    scene.addEventListener('arReady', () => { s.textContent = 'CAMERA ON — point at brick!'; s.style.color = 'lime'; });
    scene.addEventListener('arError', (e) => { s.textContent = 'AR ERROR: ' + JSON.stringify(e.detail); s.style.color = 'red'; });
    document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => { s.textContent = 'TARGET FOUND!'; });
  </script>
</body>
</html>
