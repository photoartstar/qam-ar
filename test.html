<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindAR Camera Test</title>
  <script src="./lib/aframe.min.js"></script>
  <script src="./lib/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      display: block !important;
    }
    a-scene video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important;
      z-index: 1 !important;
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
      -webkit-transform: translateZ(0) !important;
      transform: translateZ(0) !important;
    }
    a-scene canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 2 !important;
      background: transparent !important;
    }
    #status {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      color: lime; font-size: 14px; text-align: center;
      font-family: monospace; background: rgba(0,0,0,0.8);
      padding: 10px 8px; line-height: 1.5;
    }
    #hint {
      position: fixed; bottom: 60px; left: 0; right: 0; z-index: 9999;
      color: white; font-size: 13px; text-align: center;
      font-family: sans-serif; background: rgba(0,0,0,0.6);
      padding: 10px; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="status">Loading…</div>
  <div id="hint">Point at the QAM brick plaque — either the close-up in-wall shot OR the flat plaque photo</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10; warmupTolerance: 1;"
    renderer="alpha: true; antialias: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: clean plaque screenshot -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box position="0 0 0" color="#ff4444" scale="0.4 0.4 0.4"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 1500; loop: true; easing: linear;">
      </a-box>
      <a-text value="TARGET 0\nFOUND!" align="center" color="yellow" width="1.5" position="0 0.4 0"></a-text>
    </a-entity>

    <!-- Target 1: in-wall brick photo -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-box position="0 0 0" color="#44ff44" scale="0.4 0.4 0.4"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 1500; loop: true; easing: linear;">
      </a-box>
      <a-text value="TARGET 1\nFOUND!" align="center" color="yellow" width="1.5" position="0 0.4 0"></a-text>
    </a-entity>
  </a-scene>

  <script>
    const s = document.getElementById('status');
    const scene = document.querySelector('a-scene');

    function fixVideo() {
      document.querySelectorAll('video').forEach(v => {
        v.style.setProperty('position', 'fixed', 'important');
        v.style.setProperty('top', '0', 'important');
        v.style.setProperty('left', '0', 'important');
        v.style.setProperty('width', '100vw', 'important');
        v.style.setProperty('height', '100vh', 'important');
        v.style.setProperty('object-fit', 'cover', 'important');
        v.style.setProperty('z-index', '1', 'important');
        v.style.setProperty('display', 'block', 'important');
        v.style.setProperty('opacity', '1', 'important');
        v.style.setProperty('-webkit-transform', 'translateZ(0)', 'important');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.setAttribute('muted', '');
      });
      document.querySelectorAll('a-scene canvas').forEach(c => {
        c.style.setProperty('position', 'fixed', 'important');
        c.style.setProperty('top', '0', 'important');
        c.style.setProperty('left', '0', 'important');
        c.style.setProperty('width', '100vw', 'important');
        c.style.setProperty('height', '100vh', 'important');
        c.style.setProperty('z-index', '2', 'important');
      });
    }

    const poll = setInterval(() => {
      if (document.querySelector('video')) { fixVideo(); clearInterval(poll); }
    }, 100);

    scene.addEventListener('loaded', () => { s.textContent = 'Scene loaded — starting camera…'; fixVideo(); });
    scene.addEventListener('arReady', () => {
      s.textContent = '✅ Camera ON — point at brick!';
      s.style.color = 'lime';
      fixVideo();
      setTimeout(fixVideo, 500);
      setTimeout(fixVideo, 1500);
    });
    scene.addEventListener('arError', (e) => {
      s.textContent = '❌ Error: ' + JSON.stringify(e.detail);
      s.style.color = 'red';
    });

    document.querySelectorAll('[mindar-image-target]').forEach((el, i) => {
      el.addEventListener('targetFound', () => {
        s.textContent = `🎯 TARGET ${i} FOUND! AR working!`;
        s.style.color = 'yellow';
        document.getElementById('hint').style.display = 'none';
      });
      el.addEventListener('targetLost', () => {
        s.textContent = `✅ Camera ON — target ${i} lost, keep scanning…`;
        s.style.color = 'lime';
      });
    });
  </script>
</body>
</html>
