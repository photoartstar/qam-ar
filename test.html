<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindAR Camera Test</title>
  <script src="./lib/aframe.min.js"></script>
  <script src="./lib/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    /* Force MindAR video visible on iOS */
    a-scene video {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: -1 !important;
    }
    a-scene canvas {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      color: lime; font-size: 15px; text-align: center;
      font-family: monospace; background: rgba(0,0,0,0.75);
      padding: 10px; line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="status">Loading…</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box position="0 0 0" color="red" scale="0.5 0.5 0.5"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 2000; loop: true; easing: linear;">
      </a-box>
    </a-entity>
  </a-scene>

  <script>
    const s = document.getElementById('status');
    const scene = document.querySelector('a-scene');

    // iOS video fix
    const fixVideo = () => {
      document.querySelectorAll('a-scene video').forEach(v => {
        v.style.setProperty('z-index', '-1', 'important');
        v.style.setProperty('width', '100%', 'important');
        v.style.setProperty('height', '100%', 'important');
        v.style.setProperty('object-fit', 'cover', 'important');
        v.style.setProperty('position', 'absolute', 'important');
        v.style.setProperty('top', '0', 'important');
        v.style.setProperty('left', '0', 'important');
      });
    };
    setInterval(() => { if (document.querySelector('a-scene video')) { fixVideo(); } }, 300);

    scene.addEventListener('loaded', () => { s.textContent = 'Scene loaded — waiting for camera…'; });
    scene.addEventListener('arReady', () => {
      fixVideo();
      s.textContent = '✅ CAMERA ON — point at the brick!';
      s.style.color = 'lime';
    });
    scene.addEventListener('arError', (e) => {
      s.textContent = '❌ AR ERROR: ' + JSON.stringify(e.detail);
      s.style.color = 'red';
    });
    document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
      s.textContent = '🎯 TARGET FOUND!';
      s.style.color = 'yellow';
    });
  </script>
</body>
</html>
